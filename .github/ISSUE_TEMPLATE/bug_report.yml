name: Bug report
description: Report a framework bug, regression, or unexpected behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in SLLMS. Please include enough detail for us to reproduce the issue on your setup.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands, config, or actions that reproduce the issue.
      placeholder: |
        1. Run ...
        2. Say / enter ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SLLMS version
      placeholder: v1.0.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
  - type: textarea
    id: models
    attributes:
      label: Runtime and model details
      description: Include Whisper, LLM, and Piper binaries/models if relevant.
      placeholder: whisper.cpp binary, GGUF model, Piper voice, CPU/RAM, audio device
  - type: textarea
    id: logs
    attributes:
      label: Logs and error output
      description: Paste the relevant output from the terminal, CI, or logs.
      render: shell
  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Paste the relevant parts of config.yaml with secrets removed.
      render: yaml
