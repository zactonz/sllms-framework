name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile sources
        env:
          PYTHONPYCACHEPREFIX: .pycache_local
        run: python -m compileall main.py llm stt tools tts utils sllms_framework tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run smoke test
        run: python scripts/smoke_test.py
